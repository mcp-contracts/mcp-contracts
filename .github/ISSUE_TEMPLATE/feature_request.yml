name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? Include examples if possible.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - "@mcp-contracts/core (library)"
        - "@mcp-contracts/cli (mcpdiff)"
        - Snapshot format
        - Documentation
        - Other
    validations:
      required: true
