version: 2
updates:
  # All npm dependencies (root + workspace packages)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      all-dependencies:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      all-actions:
        patterns:
          - "*"
    ignore:
      - dependency-name: "lukekania/generate-release-notes"
