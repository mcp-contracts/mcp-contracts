# Example: Using mcp-contracts in CI to catch breaking MCP schema changes
#
# This workflow runs on every pull request that modifies your MCP server.
# It diffs the live server against a committed baseline.
# If breaking changes are detected, the workflow fails.
#
# Setup:
#   1. Capture your initial baseline: mcpdiff baseline update --command "node dist/index.js"
#   2. Commit contracts/baseline.mcpc.json to your repo
#   3. Add this workflow to .github/workflows/

name: MCP Contract Check
on:
  pull_request:
    paths:
      # Only run when server code changes — adjust to your project structure
      - "src/**"
      - "package.json"

jobs:
  # ── Option A: GitHub Action (recommended) ──────────────────
  # One step handles everything: connect, diff, report, PR comment.
  contract-check-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies & build
        run: npm ci && npm run build

      - name: Check MCP contract
        uses: mcp-contracts/github-action@v0
        with:
          baseline: contracts/baseline.mcpc.json
          command: node dist/index.js
          fail-on: breaking
          comment-on-pr: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # ── Option B: mcpdiff ci command ───────────────────────────
  # Use the CLI directly — works in any CI system, not just GitHub.
  contract-check-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies & build
        run: npm ci && npm run build

      - name: Install mcpdiff
        run: npm install -g @mcp-contracts/cli

      - name: Check MCP contract
        run: mcpdiff ci --baseline contracts/baseline.mcpc.json --command "node dist/index.js"
        # Auto-detects GitHub Actions, writes step summary, uses markdown format

      # Optional: fail on warnings too (stricter)
      # - name: Strict check
      #   run: mcpdiff ci --baseline contracts/baseline.mcpc.json --command "node dist/index.js" --fail-on warning
