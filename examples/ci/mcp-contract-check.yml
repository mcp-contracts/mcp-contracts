# Example: Using mcpdiff in CI to catch breaking MCP schema changes
#
# This workflow runs on every pull request that modifies your MCP server.
# It captures a fresh snapshot and diffs it against the committed baseline.
# If breaking changes are detected, the workflow fails.
#
# Setup:
#   1. Capture your initial baseline: mcpdiff snapshot --command "..." -o contracts/baseline.mcpc.json
#   2. Commit the baseline to your repo
#   3. Add this workflow to .github/workflows/

name: MCP Contract Check
on:
  pull_request:
    paths:
      # Only run when server code changes — adjust to your project structure
      - "src/**"
      - "package.json"

jobs:
  contract-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run build

      - name: Install mcpdiff
        run: npm install -g @mcp-contracts/cli

      - name: Capture current snapshot
        run: mcpdiff snapshot --command "node dist/index.js" -o /tmp/current.mcpc.json

      - name: Diff against baseline
        run: mcpdiff diff contracts/baseline.mcpc.json /tmp/current.mcpc.json --format markdown > /tmp/diff-report.md

      # Optional: post the diff as a PR comment
      - name: Comment on PR
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: mcp-contract
          path: /tmp/diff-report.md

      # Optional: also check with strict mode (fail on warnings)
      # - name: Strict check (fail on warnings)
      #   run: mcpdiff diff contracts/baseline.mcpc.json /tmp/current.mcpc.json --fail-on warning
